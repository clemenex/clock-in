<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Cobalt Blue Squircle Background -->
  <rect width="512" height="512" rx="128" fill="#004AAD"/>
  
  <!-- Outer Clock Ring -->
  <circle cx="256" cy="256" r="144" fill="none" stroke="#FFFFFF" stroke-width="36" stroke-linecap="round"/>
  
  <!-- Minute Hand (Pointing to 3 o'clock) -->
  <line x1="256" y1="256" x2="352" y2="256" stroke="#FFFFFF" stroke-width="36" stroke-linecap="round"/>
  
  <!-- Hour Hand (Pointing to 12 o'clock) -->
  <line x1="256" y1="256" x2="256" y2="160" stroke="#FFFFFF" stroke-width="36" stroke-linecap="round"/>
  
  <!-- Center Pivot Dot -->
  <circle cx="256" cy="256" r="24" fill="#FFFFFF"/>
</svg>